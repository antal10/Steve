<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Steve - AI Council</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="view-control" class="view active">
    <header class="panel-header">
      <div>
        <h1 class="logo">Steve</h1>
        <p class="subtitle">Local AI council orchestrator</p>
      </div>
      <button id="btn-thread" class="btn-secondary btn-thread" disabled>Open Thread</button>
    </header>

    <section class="prompt-section">
      <label class="section-label" for="prompt-input">Prompt</label>
      <textarea id="prompt-input" placeholder="Ask the council..." rows="6"></textarea>
    </section>

    <section class="agents-section">
      <span class="section-label">Agents</span>
      <div class="agent-chips" id="agent-chips">
        <button class="agent-chip active" data-agent="o3" style="--agent-color: #10a37f">@o3</button>
        <button class="agent-chip active" data-agent="gemini" style="--agent-color: #4285f4">@gemini</button>
        <button class="agent-chip active" data-agent="copilot" style="--agent-color: #00a4ef">@copilot</button>
        <button class="agent-chip active" data-agent="claude" style="--agent-color: #d97706">@claude</button>
        <button class="agent-chip active" data-agent="sonar" style="--agent-color: #1da1f2">@sonar</button>
      </div>
    </section>

    <section class="stage-section">
      <span class="section-label">Stage</span>
      <div class="stage-bar" id="stage-bar">
        <div class="stage-item active" data-stage="idle">Idle</div>
        <div class="stage-item" data-stage="broadcasting">Broadcasting</div>
        <div class="stage-item" data-stage="collecting">Collecting</div>
        <div class="stage-item" data-stage="paused">Paused</div>
        <div class="stage-item" data-stage="deliberating">Deliberating</div>
        <div class="stage-item" data-stage="minutes">Minutes Ready</div>
      </div>
    </section>

    <section class="action-section">
      <button id="btn-run" class="btn-primary">Run</button>
      <button id="btn-pause" class="btn-secondary" disabled>Pause</button>
      <button id="btn-resume" class="btn-secondary" disabled>Resume</button>
    </section>

    <section class="log-section">
      <div class="section-head">
        <span class="section-label">Live Log</span>
        <span id="run-status" class="run-status">Ready</span>
      </div>
      <div id="log-strip" class="log-strip"></div>
    </section>
  </div>

  <div id="view-thread" class="view">
    <header class="thread-header">
      <button id="btn-back" class="btn-secondary">Back To Control Panel</button>
      <h2 class="thread-title">Council Thread</h2>
      <button id="btn-copy" class="btn-secondary">Copy All</button>
    </header>

    <div id="thread-container" class="thread-container">
      <div id="root-post" class="post-card root-post" style="display:none">
        <div class="post-meta">
          <span class="post-badge user-badge">You</span>
          <span class="post-timestamp" id="root-timestamp"></span>
        </div>
        <div class="post-content" id="root-content"></div>
      </div>

      <div id="posts-area" class="posts-area"></div>

      <div id="minutes-card" class="minutes-card" style="display:none">
        <h3 class="minutes-title">Meeting Minutes</h3>
        <div id="minutes-content" class="minutes-content"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
